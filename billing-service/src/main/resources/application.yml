server:
  port: 8084

spring:
  application:
    name: billing-service

  # ── Shared Database ───────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/hms_db
    username: hms_user
    password: hms_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: BillingHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: hms_billing       # ← this service only sees hms_billing schema

  # ── Redis ─────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 600000    # 10 minutes

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: billing-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hms.*"

# ── Eureka ─────────────────────────────────────────────────────────────────────
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/

# ── Internal Gateway Secret ────────────────────────────────────────────────────
internal:
  secret: hms-internal-secret

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── SpringDoc ──────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Kafka Topic Names ──────────────────────────────────────────────────────────
kafka:
  topics:
    bill-generated: bill.generated
    payment-success: payment.success
    payment-failed: payment.failed
    payment-overdue: payment.overdue

# ── Dummy Payment Gateway ──────────────────────────────────────────────────────
payment:
  gateway:
    mode: DUMMY
    success-rate: 0.95

# ── Inter-service WebClient ────────────────────────────────────────────────────
services:
  user-service:
    base-url: lb://user-service

logging:
  level:
    com.hms: DEBUG
    root: INFO
  # pattern is defined in logback-spring.xml (includes MDC fields)
