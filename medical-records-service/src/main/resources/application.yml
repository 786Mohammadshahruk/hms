server:
  port: 8083

spring:
  application:
    name: medical-records-service

  # ── Shared Database ───────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/hms_db
    username: hms_user
    password: hms_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: MedicalHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: hms_medical       # ← this service only sees hms_medical schema

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: medical-records-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hms.*"

# ── Eureka ─────────────────────────────────────────────────────────────────────
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/

# ── Internal Gateway Secret ────────────────────────────────────────────────────
internal:
  secret: hms-internal-secret

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── SpringDoc ──────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Kafka Topic Names ──────────────────────────────────────────────────────────
kafka:
  topics:
    prescription-created: prescription.created
    test-ordered: test.ordered
    test-result-uploaded: test.result.uploaded

# ── Inter-service WebClient ────────────────────────────────────────────────────
services:
  user-service:
    base-url: lb://user-service

logging:
  level:
    com.hms: DEBUG
    root: INFO
  # pattern is defined in logback-spring.xml (includes MDC fields)
