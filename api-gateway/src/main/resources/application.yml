server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # ── User Service — public auth endpoints (no JWT check) ───────────────
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**

        # ── User Service — protected endpoints ────────────────────────────────
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: AuthenticationFilter

        # ── Appointment Service ───────────────────────────────────────────────
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/v1/appointments/**,/api/v1/schedules/**
          filters:
            - name: AuthenticationFilter

        # ── Medical Records Service ───────────────────────────────────────────
        - id: medical-records-service
          uri: lb://medical-records-service
          predicates:
            - Path=/api/v1/prescriptions/**,/api/v1/tests/**
          filters:
            - name: AuthenticationFilter

        # ── Billing Service ───────────────────────────────────────────────────
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/bills/**,/api/v1/payments/**
          filters:
            - name: AuthenticationFilter

        # ── Notification Service ──────────────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthenticationFilter

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

# ── JWT (hex-encoded 256-bit key — same across all services) ─────────────────
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hms: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"